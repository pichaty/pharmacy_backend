version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pharmacy_user:pharmacy_pass@db:5432/pharmacy_db
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app
      - ../pharmacy_chatbot:/pharmacy_chatbot

volumes:
  postgres_data: